<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — {{TARGET_TITLE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1f2e;
    --ink-light: #4a5568;
    --ink-muted: #718096;
    --accent: #2d6b5f;
    --accent-light: #e8f4f0;
    --accent-warm: #d4a853;
    --cream: #faf9f7;
    --card: #ffffff;
    --border: #e2e0dc;
    --border-light: #f0eee9;
    --shadow: rgba(26, 31, 46, 0.06);
    --serif: 'Playfair Display', 'Noto Serif SC', serif;
    --sans: 'Source Sans 3', 'Noto Sans SC', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: #f0efec;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ========== EXPORT BUTTON ========== */
  .export-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(26, 31, 46, 0.95);
    backdrop-filter: blur(12px);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .export-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 28px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .export-btn:hover {
    background: #245a50;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(45, 107, 95, 0.3);
  }

  .export-btn:active { transform: translateY(0); }

  .export-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .export-hint { color: rgba(255,255,255,0.5); font-size: 13px; }

  .edit-btn {
    background: transparent;
    color: rgba(255,255,255,0.8);
    border: 1.5px solid rgba(255,255,255,0.3);
    padding: 10px 28px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .edit-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.5);
  }

  .edit-btn.active {
    background: var(--accent-warm);
    color: #1a1f2e;
    border-color: var(--accent-warm);
  }

  .edit-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .resume.editing {
    outline: 2px dashed var(--accent);
    outline-offset: 4px;
    overflow: visible;
  }

  .resume.editing *:hover {
    outline: 1px dashed rgba(45, 107, 95, 0.3);
    outline-offset: 1px;
  }

  /* ========== LOADING OVERLAY ========== */
  .loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 31, 46, 0.85);
    backdrop-filter: blur(8px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
  }

  .loading-overlay.active { display: flex; }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent-warm);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: #fff;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  /* ========== RESUME CONTAINER ========== */
  .resume {
    max-width: 800px;
    margin: 72px auto 60px;
    background: var(--cream);
    box-shadow: 0 2px 40px var(--shadow), 0 0 0 1px var(--border-light);
    position: relative;
    overflow: hidden;
  }

  .resume::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-warm), var(--accent));
  }

  /* ========== HEADER ========== */
  .header {
    padding: 36px 44px 28px;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 44px; right: 44px;
    height: 1px;
    background: var(--border);
  }

  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
  }

  .header-left { flex: 1; }

  .header-photo {
    width: 96px;
    height: 128px;
    border-radius: 4px;
    object-fit: cover;
    object-position: center top;
    border: 1px solid var(--border);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .name-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 4px;
  }

  .name-zh {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 4px;
    line-height: 1;
  }

  .name-en {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 400;
    color: var(--ink-muted);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .title-row {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .title-main {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--accent);
  }

  .title-divider {
    width: 24px;
    height: 1px;
    background: var(--accent-warm);
  }

  .title-sub {
    font-size: 14px;
    font-weight: 300;
    color: var(--ink-muted);
    letter-spacing: 1px;
  }

  .contact-row {
    margin-top: 12px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .contact-item {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .contact-dot {
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ========== SECTIONS ========== */
  .section {
    padding: 20px 44px;
    position: relative;
  }

  .section + .section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 44px; right: 44px;
    height: 1px;
    background: var(--border-light);
  }

  .section-title {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::before {
    content: '';
    width: 20px;
    height: 2px;
    background: var(--accent-warm);
    flex-shrink: 0;
  }

  /* ========== SUMMARY ========== */
  .summary {
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-light);
    font-weight: 300;
  }

  .summary strong {
    color: var(--ink);
    font-weight: 600;
  }

  /* ========== PROJECT CARDS ========== */
  .projects-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .project-card {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--accent);
    padding: 12px 18px;
    transition: all 0.3s ease;
  }

  .project-card:hover {
    border-left-color: var(--accent-warm);
    box-shadow: 0 4px 20px var(--shadow);
    transform: translateX(2px);
  }

  .project-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .project-badge {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 3px;
  }

  .project-desc {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-light);
    font-weight: 300;
    margin-bottom: 8px;
  }

  .project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tag {
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 3px;
    letter-spacing: 0.3px;
  }

  /* ========== METHOD GRID ========== */
  .method-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .method-item {
    background: var(--card);
    border: 1px solid var(--border-light);
    padding: 12px 16px;
    position: relative;
  }

  .method-item::before {
    content: '';
    position: absolute;
    top: 12px; left: 0;
    width: 3px; height: 16px;
    background: var(--accent-warm);
  }

  .method-label {
    font-family: var(--serif);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
  }

  .method-desc {
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--ink-muted);
    font-weight: 300;
  }

  /* ========== WORK EXPERIENCE ========== */
  .job { margin-bottom: 16px; }
  .job:last-child { margin-bottom: 0; }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 5px;
    flex-wrap: wrap;
    gap: 4px;
  }

  .job-title {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  .job-company {
    font-weight: 300;
    color: var(--ink-muted);
    font-size: 13.5px;
  }

  .job-date {
    font-size: 12px;
    color: var(--accent);
    font-weight: 400;
    font-style: italic;
    font-family: var(--serif);
  }

  .job-bullets {
    list-style: none;
    padding: 0;
  }

  .job-bullets li {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-light);
    font-weight: 300;
    padding-left: 14px;
    position: relative;
    margin-bottom: 1px;
  }

  .job-bullets li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 13px;
  }

  .job-bullets li strong {
    font-weight: 600;
    color: var(--ink);
  }

  /* ========== EDUCATION ========== */
  .edu-item { margin-bottom: 10px; }
  .edu-item:last-child { margin-bottom: 0; }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
    flex-wrap: wrap;
    gap: 4px;
  }

  .edu-degree {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  .edu-school {
    font-weight: 300;
    color: var(--ink-muted);
  }

  .edu-date {
    font-size: 12px;
    color: var(--accent);
    font-style: italic;
    font-family: var(--serif);
  }

  .edu-details {
    list-style: none;
    padding: 0;
  }

  .edu-details li {
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-muted);
    font-weight: 300;
    padding-left: 16px;
    position: relative;
  }

  .edu-details li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 11px;
  }

  /* ========== SKILLS ========== */
  .skills-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 16px;
    align-items: baseline;
  }

  .skill-label {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    text-align: right;
    white-space: nowrap;
  }

  .skill-content {
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 300;
    line-height: 1.6;
  }

  .skill-row { display: contents; }

  /* ========== ANIMATIONS ========== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section { animation: fadeUp 0.5s ease both; }
  .section:nth-child(2) { animation-delay: 0.05s; }
  .section:nth-child(3) { animation-delay: 0.1s; }
  .section:nth-child(4) { animation-delay: 0.15s; }
  .section:nth-child(5) { animation-delay: 0.2s; }
  .section:nth-child(6) { animation-delay: 0.25s; }
  .section:nth-child(7) { animation-delay: 0.3s; }

  /* ========== PRINT / PDF ========== */
  @page {
    size: A4;
    margin: 0;
  }

  @media print {
    html, body {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      background: var(--cream) !important;
    }
    .export-bar { display: none !important; }
    .edit-btn { display: none !important; }
    .loading-overlay { display: none !important; }
    .resume { margin: 0; box-shadow: none; max-width: 100%; background: var(--cream); }
    .project-card:hover { transform: none; box-shadow: none; }
    .project-card { transform: none !important; box-shadow: none !important; }
    .section { animation: none; }
    .project-card, .method-item, .edu-item, .skills-grid, .job-header {
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .section-title, .job-header {
      page-break-after: avoid;
      break-after: avoid;
    }
    .job-bullets li, .edu-details li, .summary, .project-desc {
      page-break-inside: avoid;
      break-inside: avoid;
    }

    /*
      内容压缩规则：如果简历内容超出两页，在此处添加字号/间距缩小规则。
      示例（根据实际内容量按需启用）：
      .section { padding: 13px 40px !important; }
      .section-title { font-size: 12px !important; margin-bottom: 9px !important; }
      .summary { font-size: 12px !important; line-height: 1.55 !important; }
      .project-name { font-size: 13px !important; }
      .project-desc { font-size: 11.2px !important; line-height: 1.45 !important; }
      .job-bullets li { font-size: 11.2px !important; line-height: 1.42 !important; }
      .skill-label, .skill-content { font-size: 11.2px !important; }
    */
  }
</style>
</head>
<body>

<!-- Export Bar -->
<div class="export-bar" id="exportBar">
  <button class="edit-btn" id="editBtn" onclick="toggleEdit()">
    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    <span id="editBtnText">编辑模式</span>
  </button>
  <button class="export-btn" onclick="exportPDF()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6zm5-6v4h2v-4h3l-4-4-4 4h3z"/></svg>
    {{EXPORT_BUTTON_TEXT}}
  </button>
  <span class="export-hint">{{EXPORT_HINT_TEXT}}</span>
</div>

<!-- Resume -->
<div class="resume" id="resume">

  <!-- HEADER -->
  <div class="header">
    <div class="header-content">
      <div class="header-left">
        <div class="name-row">
          <span class="name-zh">{{NAME_ZH}}</span>
          <span class="name-en">{{NAME_EN}}</span>
        </div>
        <div class="title-row">
          <span class="title-main">{{TARGET_TITLE}}</span>
          <!-- Optional subtitle -->
          <!-- <span class="title-divider"></span> -->
          <!-- <span class="title-sub">{{SUBTITLE}}</span> -->
        </div>
        <div class="contact-row">
          {{CONTACT_ITEMS}}
          <!-- Example:
          <span class="contact-item"><span class="contact-dot"></span>13800138000</span>
          <span class="contact-item"><span class="contact-dot"></span>name@email.com</span>
          <span class="contact-item"><span class="contact-dot"></span>城市</span>
          -->
        </div>
      </div>
      {{PHOTO_ELEMENT}}
      <!-- If photo: <img class="header-photo" src="data:image/jpeg;base64,{{PHOTO_BASE64}}" alt="{{NAME_ZH}}"> -->
      <!-- If no photo: leave empty -->
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="section">
    <div class="section-title">{{SUMMARY_TITLE}}</div>
    <div class="summary">
      {{SUMMARY_CONTENT}}
    </div>
  </div>

  <!-- SECTIONS: Fill based on content priority -->
  <!--
    Use the following section types as building blocks.
    Arrange them in the order that best matches the user's background and target role.

    == PROJECT CARDS ==
    <div class="section">
      <div class="section-title">{{SECTION_TITLE}}</div>
      <div class="projects-grid">
        <div class="project-card">
          <div class="project-name">项目名称 <span class="project-badge">标签</span></div>
          <div class="project-desc">项目描述</div>
          <div class="project-tags">
            <span class="tag">标签1</span>
            <span class="tag">标签2</span>
          </div>
        </div>
      </div>
    </div>

    == METHOD GRID (2x2) ==
    <div class="section">
      <div class="section-title">{{SECTION_TITLE}}</div>
      <div class="method-grid">
        <div class="method-item">
          <div class="method-label">标题</div>
          <div class="method-desc">描述</div>
        </div>
      </div>
    </div>

    == WORK EXPERIENCE ==
    <div class="section">
      <div class="section-title">{{SECTION_TITLE}}</div>
      <div class="job">
        <div class="job-header">
          <div>
            <span class="job-title">职位</span>
            <span class="job-company"> · 公司名</span>
          </div>
          <span class="job-date">起止时间</span>
        </div>
        <ul class="job-bullets">
          <li><strong>关键词：</strong>描述内容</li>
        </ul>
      </div>
    </div>

    == EDUCATION ==
    <div class="section">
      <div class="section-title">{{SECTION_TITLE}}</div>
      <div class="edu-item">
        <div class="edu-header">
          <div>
            <span class="edu-degree">学位</span>
            <span class="edu-school"> · 学校名</span>
          </div>
          <span class="edu-date">起止时间</span>
        </div>
        <ul class="edu-details">
          <li>详情</li>
        </ul>
      </div>
    </div>

    == SKILLS GRID ==
    <div class="section">
      <div class="section-title">{{SECTION_TITLE}}</div>
      <div class="skills-grid">
        <div class="skill-row">
          <span class="skill-label">类别</span>
          <span class="skill-content">技能列表</span>
        </div>
      </div>
    </div>
  -->

</div>

<script>
function toggleEdit() {
  var resume = document.getElementById('resume');
  var btn = document.getElementById('editBtn');
  var btnText = document.getElementById('editBtnText');
  var isEditing = resume.contentEditable === 'true';

  if (isEditing) {
    resume.contentEditable = 'false';
    resume.classList.remove('editing');
    btn.classList.remove('active');
    btnText.textContent = '编辑模式';
  } else {
    resume.contentEditable = 'true';
    resume.classList.add('editing');
    btn.classList.add('active');
    btnText.textContent = '退出编辑';
  }
}

function exportPDF() {
  var resume = document.getElementById('resume');
  if (resume.contentEditable === 'true') {
    resume.contentEditable = 'false';
    resume.classList.remove('editing');
    document.getElementById('editBtn').classList.remove('active');
    document.getElementById('editBtnText').textContent = '编辑模式';
  }
  window.print();
}
</script>

</body>
</html>
