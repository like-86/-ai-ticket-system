services:
    mysql:
      image: mysql:8.0
      environment:
        MYSQL_ROOT_PASSWORD: 123456
        MYSQL_DATABASE: ai_ticket
      ports:
        - "3306:3306"
      volumes:
        - mysql_data:/var/lib/mysql
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        timeout: 10s
        retries: 10

    redis:
      image: redis:7
      ports:
        - "6379:6379"

    backend:
      build: .
      ports:
        - "8000:8000"
      depends_on:
        mysql:
          condition: service_healthy
        redis:
          condition: service_started
      environment:
        DATABASE_URL: mysql+pymysql://root:123456@mysql:3306/ai_ticket
        REDIS_URL: redis://redis:6379/0
        DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      volumes:
        - ./chroma_data:/app/chroma_data

volumes:
    mysql_data:
